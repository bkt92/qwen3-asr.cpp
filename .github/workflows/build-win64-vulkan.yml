name: Build Win64 Vulkan

on:
    push:
        branches: [main]
        tags: ["v*"]
    pull_request:
        branches: [main]
    workflow_dispatch:
        inputs:
            create_release:
                description: "Create a GitHub Release"
                required: false
                default: false
                type: boolean
            tag_name:
                description: "Release tag (required if create_release is true)"
                required: false
                type: string

jobs:
    build:
        runs-on: windows-latest

        steps:
            - uses: actions/checkout@v6
              with:
                  submodules: true
                  fetch-depth: 0

            - uses: jakoch/install-vulkan-sdk-action@v1
              with:
                  vulkan_version: 1.4.304.1
                  install_runtime: true

            - name: Configure
              run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -DGGML_VULKAN=ON

            - name: Build
              run: cmake --build build --config Release -j $env:NUMBER_OF_PROCESSORS

            - name: Collect artifacts
              run: python tests/flatten_bin_files.py build bin

            - name: Upload artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: qwen3-asr-win64-vulkan
                  path: bin/
                  retention-days: 30

    release:
        needs: build
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.create_release == true)
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - uses: actions/download-artifact@v4
              with:
                  name: qwen3-asr-win64-vulkan
                  path: bin/

            - name: Create zip
              run: |
                  cd bin
                  zip -r ../qwen3-asr-win64-vulkan.zip .

            - name: Determine tag
              id: tag
              run: |
                  if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
                      echo "value=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
                  elif [[ -n "${{ inputs.tag_name }}" ]]; then
                      echo "value=${{ inputs.tag_name }}" >> "$GITHUB_OUTPUT"
                  else
                      echo "value=v0.1.1-$(date +%Y%m%d%H%M%S)" >> "$GITHUB_OUTPUT"
                  fi

            - name: Create release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ steps.tag.outputs.value }}
                  name: "Build ${{ steps.tag.outputs.value }}"
                  body: "Automated Win64 Vulkan build from ${{ github.sha }}"
                  files: qwen3-asr-win64-vulkan.zip
